<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HSK 5급 단어장 · 1300</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff5e6;
    --bg-2: #fde8d0;
    --card: #ffffff;
    --card-2: #fff9f0;
    --ink: #2d3748;
    --ink-2: #5a6c7d;
    --primary: #ff8fa3;
    --primary-deep: #f06b87;
    --accent: #ffc857;
    --accent-deep: #f5b53b;
    --jade: #88d8a3;
    --jade-deep: #66c282;
    --sky: #a8dadc;
    --shadow: rgba(255, 143, 163, 0.18);
    --shadow-soft: rgba(45, 55, 72, 0.06);
    --line: rgba(45, 55, 72, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', 'Noto Serif KR', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255, 200, 87, 0.25) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(168, 218, 220, 0.25) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255, 143, 163, 0.08) 0%, transparent 60%);
  }
  #app { position: relative; z-index: 2; max-width: 980px; margin: 0 auto; padding: 22px 18px 80px; }

  /* HEADER */
  header.masthead {
    padding: 22px 22px 20px;
    margin-bottom: 22px;
    background: var(--card);
    border-radius: 28px;
    box-shadow: 0 4px 0 var(--shadow), 0 8px 20px var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }
  header.masthead::after {
    content: ''; position: absolute;
    top: -20px; right: -20px; width: 110px; height: 110px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.4; pointer-events: none;
  }
  .header-top {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 12px;
    position: relative; z-index: 1;
  }
  .pixel-logo {
    flex-shrink: 0;
    width: 72px; height: 72px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: drop-shadow(0 3px 0 rgba(45, 55, 72, 0.08));
  }
  .brand {
    display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
  }
  .brand-title {
    font-family: 'Noto Serif SC', serif; font-weight: 900;
    font-size: clamp(22px, 5.5vw, 32px); letter-spacing: -0.01em;
    line-height: 1.05; color: var(--ink);
  }
  .brand-title .accent {
    color: var(--primary-deep);
    background: linear-gradient(180deg, transparent 60%, rgba(255, 200, 87, 0.55) 60%);
    padding: 0 4px;
    border-radius: 6px;
  }
  .brand-sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(12px, 2.8vw, 15px); color: var(--ink-2);
    margin-top: 4px;
  }
  .meta-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--ink-2);
    position: relative; z-index: 1;
  }
  .meta-pill {
    background: var(--bg-2);
    padding: 5px 12px;
    border-radius: 999px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .meta-pill strong { color: var(--primary-deep); font-weight: 700; }

  /* TABS */
  .tabs {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 22px;
  }
  .tab {
    padding: 14px 8px; text-align: center;
    font-family: 'Noto Serif KR', serif; font-weight: 700;
    font-size: clamp(13px, 3.4vw, 15px);
    color: var(--ink-2);
    cursor: pointer; user-select: none;
    background: var(--card);
    border: none; border-radius: 18px;
    box-shadow: 0 3px 0 var(--shadow-soft), 0 6px 12px var(--shadow-soft);
    transition: all 0.15s ease;
    line-height: 1.3;
  }
  .tab small {
    display: block;
    font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
    margin-top: 2px; opacity: 0.55; text-transform: uppercase;
  }
  .tab:hover {
    transform: translateY(-2px);
  }
  .tab.active {
    background: var(--primary); color: white;
    box-shadow: 0 3px 0 var(--primary-deep), 0 6px 14px var(--shadow);
  }
  .tab.active small { opacity: 0.85; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Noto Serif KR', serif; font-weight: 800;
    font-size: clamp(20px, 5vw, 24px);
    margin-bottom: 6px;
    color: var(--ink);
  }
  .section-title .num {
    display: inline-block;
    background: var(--accent);
    color: var(--ink);
    padding: 2px 10px;
    border-radius: 10px;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 700; font-size: 0.85em;
    margin-right: 6px;
  }
  .section-desc {
    font-size: 14px; color: var(--ink-2); margin-bottom: 20px;
    line-height: 1.6;
  }

  /* BLOCK GRID */
  .block-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .block-card {
    background: var(--card);
    border: none;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    font-family: inherit; color: inherit;
    border-radius: 22px;
    box-shadow: 0 4px 0 var(--shadow-soft), 0 8px 16px var(--shadow-soft);
    position: relative; overflow: hidden;
  }
  .block-card::before {
    content: ''; position: absolute;
    top: -10px; right: -10px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.25;
    transition: all 0.2s ease;
  }
  .block-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 0 var(--shadow), 0 12px 22px var(--shadow);
    background: var(--primary); color: white;
  }
  .block-card:hover::before { opacity: 0.4; transform: scale(1.5); background: white; }
  .block-card .block-num {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 36px; font-weight: 700;
    line-height: 1; margin-bottom: 6px;
    color: var(--primary);
  }
  .block-card:hover .block-num { color: white; }
  .block-card .block-range {
    font-size: 11px; letter-spacing: 0.05em;
    opacity: 0.65;
  }
  .block-card .block-label {
    font-size: 13px; margin-top: 8px;
    font-weight: 600;
  }

  /* WORDLIST */
  .wordlist-controls {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
  }
  .btn {
    background: var(--card); border: none;
    color: var(--ink); padding: 10px 16px; cursor: pointer;
    font-family: inherit; font-weight: 600; font-size: 13px;
    border-radius: 14px;
    box-shadow: 0 3px 0 var(--shadow-soft), 0 5px 10px var(--shadow-soft);
    transition: all 0.15s ease;
  }
  .btn:hover {
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--shadow-soft); }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 3px 0 var(--primary-deep), 0 5px 10px var(--shadow); }
  .btn-primary:hover { background: var(--primary-deep); }
  .btn-vermilion { background: var(--accent); color: var(--ink); box-shadow: 0 3px 0 var(--accent-deep), 0 5px 10px rgba(245, 181, 59, 0.3); }
  .btn-vermilion:hover { background: var(--accent-deep); }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .wordlist {
    display: flex; flex-direction: column; gap: 10px;
  }
  .word-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    padding: 16px 18px;
    align-items: start;
    background: var(--card);
    border-radius: 18px;
    box-shadow: 0 2px 0 var(--shadow-soft), 0 4px 10px var(--shadow-soft);
    transition: all 0.15s ease;
  }
  .word-row .id {
    font-size: 11px; color: white;
    background: var(--primary);
    padding: 4px 10px; border-radius: 999px;
    text-align: center; font-weight: 700;
    align-self: start;
    letter-spacing: 0.02em;
    min-width: 46px;
  }
  .word-row .body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .word-row .hanzi {
    font-family: 'Noto Serif SC', serif; font-weight: 700;
    font-size: 28px; color: var(--ink); line-height: 1.1;
  }
  .word-row .pinyin {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 18px; color: var(--primary-deep); font-weight: 600;
  }
  .word-row .meaning {
    font-size: 14px; color: var(--ink-2); line-height: 1.5;
  }
  .word-row.hidden-mode .pinyin,
  .word-row.hidden-mode .meaning { visibility: hidden; }
  .word-row.hidden-mode.revealed .pinyin,
  .word-row.hidden-mode.revealed .meaning { visibility: visible; }
  .word-row.hidden-mode { cursor: pointer; }
  .word-row.hidden-mode:hover { background: var(--card-2); }

  /* QUIZ */
  .quiz-stage {
    background: var(--card);
    border: none;
    padding: clamp(24px, 5vw, 36px) clamp(20px, 4vw, 32px);
    margin-bottom: 18px;
    border-radius: 28px;
    box-shadow: 0 6px 0 var(--shadow-soft), 0 12px 24px var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }
  .quiz-stage::before {
    content: ''; position: absolute;
    top: -30px; left: -30px; width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.3;
  }
  .quiz-stage::after {
    content: ''; position: absolute;
    bottom: -30px; right: -30px; width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--sky) 0%, transparent 70%);
    opacity: 0.4;
  }
  .quiz-progress {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-weight: 600;
    color: var(--ink-2);
    margin-bottom: 14px;
    position: relative; z-index: 1;
  }
  .quiz-progress span {
    background: var(--bg-2);
    padding: 5px 12px;
    border-radius: 999px;
  }
  .progress-bar {
    height: 8px; background: var(--bg-2);
    border: none; border-radius: 999px;
    margin-bottom: 24px; overflow: hidden;
    position: relative; z-index: 1;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .quiz-hanzi {
    font-family: 'Noto Serif SC', serif; font-weight: 900;
    font-size: clamp(64px, 17vw, 100px);
    line-height: 1; text-align: center;
    margin: 16px 0 24px;
    color: var(--ink);
    letter-spacing: -0.02em;
    position: relative; z-index: 1;
  }
  .quiz-hint {
    text-align: center; color: var(--ink-2);
    font-size: 13px; margin-bottom: 14px;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    position: relative; z-index: 1;
  }
  .quiz-actions {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    position: relative; z-index: 1;
  }
  .quiz-actions .btn { flex: 1 1 130px; padding: 14px 20px; font-size: 14px; }

  .reveal-block {
    margin-top: 18px; padding: 18px 20px 0;
    text-align: center;
    border-top: 2px dashed var(--line);
    position: relative; z-index: 1;
  }
  .reveal-pinyin {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 700; font-size: clamp(24px, 6vw, 34px);
    color: var(--primary-deep); margin-bottom: 8px;
  }
  .reveal-meaning {
    font-size: clamp(14px, 3.6vw, 16px); color: var(--ink-2);
    line-height: 1.6;
  }
  .judge-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 20px;
    position: relative; z-index: 1;
  }
  .judge-btn {
    padding: 16px 8px; font-weight: 700;
    font-size: 14px; border: none;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s ease;
    background: var(--card-2);
    border-radius: 16px;
    box-shadow: 0 3px 0 var(--shadow-soft), 0 5px 10px var(--shadow-soft);
  }
  .judge-btn:hover { transform: translateY(-2px); }
  .judge-btn.correct { color: var(--jade-deep); }
  .judge-btn.correct:hover { background: var(--jade); color: white; box-shadow: 0 3px 0 var(--jade-deep), 0 5px 10px rgba(102, 194, 130, 0.3); }
  .judge-btn.wrong { color: var(--primary-deep); }
  .judge-btn.wrong:hover { background: var(--primary); color: white; box-shadow: 0 3px 0 var(--primary-deep), 0 5px 10px var(--shadow); }

  /* RESULT */
  .result-card {
    text-align: center; padding: 32px 24px;
    background: var(--card);
    border-radius: 28px;
    box-shadow: 0 6px 0 var(--shadow-soft), 0 12px 24px var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: ''; position: absolute;
    top: -40px; right: -40px; width: 140px; height: 140px;
    border-radius: 50%;
    background: var(--accent); opacity: 0.2;
  }
  .result-score {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 700; font-size: clamp(60px, 14vw, 88px);
    color: var(--primary); line-height: 1;
    position: relative; z-index: 1;
  }
  .result-score .total { color: var(--ink-2); font-size: 0.5em; opacity: 0.6; }
  .result-label {
    font-size: 13px; font-weight: 600;
    color: var(--ink-2);
    margin-top: 10px;
    position: relative; z-index: 1;
  }
  .result-msg {
    margin-top: 16px; font-size: 16px;
    position: relative; z-index: 1;
  }
  .result-actions {
    display: flex; gap: 10px; margin-top: 24px;
    flex-wrap: wrap; justify-content: center;
    position: relative; z-index: 1;
  }

  /* SETUP */
  .setup-card {
    background: var(--card);
    padding: 22px 20px; margin-bottom: 16px;
    border-radius: 22px;
    box-shadow: 0 4px 0 var(--shadow-soft), 0 8px 16px var(--shadow-soft);
  }
  .setup-card h3 {
    font-family: 'Noto Serif KR', serif; font-weight: 700;
    font-size: 17px; margin-bottom: 14px;
  }
  .pill-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
  }
  .pill {
    padding: 9px 16px; border: none;
    background: var(--bg-2); cursor: pointer;
    font-family: inherit;
    font-size: 13px; font-weight: 600;
    color: var(--ink-2);
    border-radius: 999px;
    transition: all 0.15s ease;
  }
  .pill.active {
    background: var(--primary); color: white;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .pill:hover:not(.active) { background: var(--card-2); }

  /* WRONG ANSWERS */
  .wrong-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 12px; margin-bottom: 22px;
  }
  .stat-card {
    padding: 18px 14px;
    background: var(--card);
    border-radius: 18px;
    box-shadow: 0 3px 0 var(--shadow-soft), 0 6px 12px var(--shadow-soft);
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-weight: 700; font-size: 32px;
    color: var(--primary); line-height: 1;
  }
  .stat-label {
    font-size: 11px; font-weight: 600;
    color: var(--ink-2);
    margin-top: 6px;
  }
  .wrong-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    padding: 16px 18px;
    background: var(--card);
    border-radius: 18px;
    margin-bottom: 10px;
    align-items: center;
    box-shadow: 0 2px 0 var(--shadow-soft), 0 4px 10px var(--shadow-soft);
  }
  .wrong-row .id {
    font-size: 11px; color: white;
    background: var(--primary);
    padding: 4px 10px; border-radius: 999px;
    text-align: center; font-weight: 700;
    min-width: 46px;
  }
  .wrong-row .body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .wrong-row .hanzi { font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 22px; color: var(--ink); }
  .wrong-row .pinyin { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--primary-deep); font-weight: 600; }
  .wrong-row .meaning { font-size: 13px; color: var(--ink-2); }
  .wrong-row .count-badge {
    font-weight: 700; font-size: 12px;
    color: white;
    background: var(--primary);
    padding: 5px 10px; border-radius: 999px;
    white-space: nowrap;
  }

  .empty {
    text-align: center; padding: 50px 20px;
    color: var(--ink-2);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    background: var(--card);
    border-radius: 22px;
    box-shadow: 0 3px 0 var(--shadow-soft), 0 6px 12px var(--shadow-soft);
  }

  /* EXAMPLE SENTENCE */
  .example-block {
    margin-top: 12px;
    padding: 14px 16px;
    background: var(--card-2);
    border: none;
    border-radius: 14px;
    font-size: 14px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .example-zh {
    font-family: 'Noto Serif SC', serif; font-weight: 500;
    font-size: 17px; color: var(--ink); line-height: 1.55;
    margin-bottom: 4px;
  }
  .example-zh em {
    background: var(--accent);
    color: var(--ink);
    font-style: normal; font-weight: 700;
    padding: 1px 4px; border-radius: 5px;
  }
  .example-pinyin {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; color: var(--primary-deep); font-weight: 500;
    line-height: 1.4; margin-bottom: 4px;
  }
  .example-ko {
    font-size: 14px; color: var(--ink-2); line-height: 1.55;
  }
  .example-error {
    color: var(--primary-deep); font-size: 13px;
    padding: 4px 0;
  }
  .word-row .example-toggle {
    margin-top: 8px;
    background: var(--bg-2); border: none;
    color: var(--primary-deep);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px; font-weight: 600;
    border-radius: 999px;
    cursor: pointer; transition: all 0.15s ease;
    align-self: flex-start;
  }
  .word-row .example-toggle:hover {
    background: var(--primary); color: white;
  }

  /* FOOTER */
  .footer-note {
    text-align: center;
    margin-top: 40px; padding: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: var(--ink-2);
    font-size: 13px;
  }

  /* SEAL */
  .seal {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    padding: 4px 10px;
    font-size: 11px;
    letter-spacing: 0.05em;
    border-radius: 999px;
    transform: rotate(-3deg);
    box-shadow: 0 2px 0 var(--primary-deep);
  }

  @media (max-width: 480px) {
    .word-row { gap: 10px; padding: 14px 14px; }
    .word-row .hanzi { font-size: 24px; }
    .word-row .pinyin { font-size: 15px; }
    .word-row .meaning { font-size: 13px; }
    .block-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .pixel-logo { width: 60px; height: 60px; }
    .header-top { gap: 12px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============ DATA ============

let state = {
  view: 'home', // home | wordlist | quiz | quiz-setup | wrong | result
  currentBlock: null, // 0-12 for blocks, 'all' for full set, 'wrong' for review
  quizSet: [],

  randomSize: 30,

// wrong answers persisted via window.storage
let wrongAnswers = {}; // { id: {count, lastSeen} }

async function loadWrongAnswers() {
  try {
    const r = await window.storage.get('hsk5_wrong_answers');
    if (r && r.value) {
      wrongAnswers = JSON.parse(r.value);
    }
  } catch (e) {
    wrongAnswers = {};
  }
}
async function saveWrongAnswers() {
  try {
    await window.storage.set('hsk5_wrong_answers', JSON.stringify(wrongAnswers));
  } catch (e) { console.warn('save failed', e); }
}
async function recordWrong(id) {
  const key = String(id);
  if (!wrongAnswers[key]) wrongAnswers[key] = { count: 0, lastSeen: 0 };
  wrongAnswers[key].count += 1;
  wrongAnswers[key].lastSeen = Date.now();
  await saveWrongAnswers();
}
async function clearWrong(id) {
  delete wrongAnswers[String(id)];
  await saveWrongAnswers();
}
async function clearAllWrong() {
  wrongAnswers = {};
  await saveWrongAnswers();
}

// ============ EXAMPLES (preloaded) ============
// Track which words are currently expanded
const expandedExamples = new Set();

function getExample(wordId) {
  return EXAMPLES[String(wordId)] || null;
}

// Highlight occurrences of `word` in `sentence` with <em> tags (escaped)
function highlightWord(sentence, word) {
  const safe = escapeHtml(sentence);
  if (!word) return safe;
  const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escapedWord, 'g');
  return safe.replace(re, m => '<em>' + m + '</em>');
}

// Render just the example slot for a word
function renderExampleSlot(w) {
  const container = document.querySelector(`[data-example-container="${w.id}"]`);
  if (!container) return;
  container.innerHTML = '';

  const row = container.closest('.word-row');
  if (row) {
    const btn = row.querySelector('.example-toggle');
    if (btn) {
      const isExpanded = expandedExamples.has(w.id);
      btn.textContent = isExpanded ? '예문 닫기 ▴' : '예문 보기 ▾';
    }
  }

  if (!expandedExamples.has(w.id)) return;

  const ex = getExample(w.id);
  if (!ex) {
    const block = el('div', { class: 'example-block' }, [
      el('div', { class: 'example-error', text: '이 단어는 아직 예문이 준비되지 않았습니다.' })
    ]);
    container.appendChild(block);
    return;
  }

  const block = el('div', { class: 'example-block' });
  block.appendChild(el('div', { class: 'example-zh', html: highlightWord(ex.zh || '', w.hanzi) }));
  if (ex.pinyin) block.appendChild(el('div', { class: 'example-pinyin', text: ex.pinyin }));
  if (ex.ko) block.appendChild(el('div', { class: 'example-ko', text: ex.ko }));
  container.appendChild(block);
}

// ============ UTIL ============
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getBlockWords(blockIdx) {
  // 13 blocks. Blocks 0-11 are 100 words each (1-1200). Block 12 is 100 words (1201-1300).
  const start = blockIdx * 100;
  return WORDS.slice(start, start + 100);
}
function blockRange(blockIdx) {
  const start = blockIdx * 100 + 1;
  const end = Math.min((blockIdx + 1) * 100, 1300);
  return start + '-' + end;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ============ RENDER ============
const app = document.getElementById('app');
function render() {
  app.innerHTML = '';
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  const main = document.createElement('main');
  if (state.view === 'home') main.appendChild(renderHome());
  else if (state.view === 'wordlist') main.appendChild(renderWordlist());
  else if (state.view === 'quiz-setup') main.appendChild(renderQuizSetup());
  else if (state.view === 'quiz') main.appendChild(renderQuiz());
  else if (state.view === 'result') main.appendChild(renderResult());
  else if (state.view === 'wrong') main.appendChild(renderWrongReview());
  app.appendChild(main);
  app.appendChild(renderFooter());
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function el(tag, opts={}, children=[]) {
  const e = document.createElement(tag);
  if (opts.class) e.className = opts.class;
  if (opts.id) e.id = opts.id;
  if (opts.html != null) e.innerHTML = opts.html;
  if (opts.text != null) e.textContent = opts.text;
  if (opts.attrs) Object.entries(opts.attrs).forEach(([k,v]) => e.setAttribute(k, v));
  if (opts.on) Object.entries(opts.on).forEach(([k,v]) => e.addEventListener(k, v));
  if (opts.style) Object.assign(e.style, opts.style);
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function renderTabs() {
  const tabs = [
    { id: 'home', label: '단어장', en: 'Vocabulary' },

    if (id === 'home') return ['home', 'wordlist'].includes(state.view);

    if (id === 'wrong') return state.view === 'wrong';

    el('button', {
      class: 'tab' + (isOnTab(t.id) ? ' active' : ''),

function renderWordlist() {
  const words = getBlockWords(state.currentBlock);
  const wrap = el('div');

  const header = el('div', { class: 'wordlist-controls' }, [
    el('div', {}, [
      el('h2', { class: 'section-title', html: '블록 <span class="num">' + (state.currentBlock + 1) + '</span> · #' + blockRange(state.currentBlock) }),
    ]),
    el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } }, [
      el('button', { class: 'btn btn-sm', text: '← 블록 목록', on: { click: () => { state.view = 'home'; render(); }}}),
      el('button', {
        class: 'btn btn-sm' + (state.hideAnswers ? ' btn-primary' : ''),
        text: state.hideAnswers ? '답 표시' : '답 가리기',
        on: { click: () => { state.hideAnswers = !state.hideAnswers; render(); }}
      }),
      el('button', {
        class: 'btn btn-sm btn-vermilion', text: '이 블록 퀴즈 →',
        on: { click: () => {
          state.quizSet = shuffle(words);
          state.quizIndex = 0;
          state.quizCorrect = [];
          state.quizWrong = [];
          state.quizRevealed = false;
          state.view = 'quiz';
          render();
        }}
      })
    ])
  ]);
  wrap.appendChild(header);

  if (state.hideAnswers) {
    wrap.appendChild(el('p', { class: 'section-desc', text: '단어를 탭하면 병음과 뜻이 보입니다.' }));
  }

  const list = el('div', { class: 'wordlist' });
  words.forEach(w => {
    const body = el('div', { class: 'body' }, [
      el('div', { class: 'hanzi', text: w.hanzi }),
      el('div', { class: 'pinyin', text: w.pinyin }),
      el('div', { class: 'meaning', text: w.meaning })
    ]);

    // example toggle button + container (only in non-hidden mode + only if example exists)
    if (!state.hideAnswers && getExample(w.id)) {
      const exContainer = el('div', { attrs: { 'data-example-container': String(w.id) } });
      const isExpanded = expandedExamples.has(w.id);

      const toggleBtn = el('button', {
        class: 'example-toggle',
        text: isExpanded ? '예문 닫기 ▴' : '예문 보기 ▾',
        on: { click: (e) => {
          e.stopPropagation();
          if (expandedExamples.has(w.id)) {
            expandedExamples.delete(w.id);
          } else {
            expandedExamples.add(w.id);
          }
          renderExampleSlot(w);
        }}
      });
      body.appendChild(toggleBtn);
      body.appendChild(exContainer);

      // initial render of example slot
      setTimeout(() => renderExampleSlot(w), 0);
    }

    const row = el('div', {
      class: 'word-row' + (state.hideAnswers ? ' hidden-mode' : ''),
      attrs: { 'data-id': w.id }
    }, [
      el('div', { class: 'id', text: '#' + w.id }),
      body
    ]);
    if (state.hideAnswers) {
      row.addEventListener('click', () => row.classList.toggle('revealed'));
    }
    list.appendChild(row);
  });
  wrap.appendChild(list);

  return wrap;
}

      })

function renderQuiz() {
  if (state.quizIndex >= state.quizSet.length) {
    state.view = 'result';
    return renderResult();
  }
  const w = state.quizSet[state.quizIndex];
  const wrap = el('div');

  const stage = el('div', { class: 'quiz-stage' });

  stage.appendChild(el('div', { class: 'quiz-progress' }, [
    el('span', { text: 'Q ' + (state.quizIndex + 1).toString().padStart(2, '0') + ' / ' + state.quizSet.length.toString().padStart(2, '0') }),
    el('span', { text: '#' + w.id })
  ]));

  const pct = Math.round((state.quizIndex / state.quizSet.length) * 100);
  stage.appendChild(el('div', { class: 'progress-bar' }, [
    el('div', { class: 'progress-bar-fill', style: { width: pct + '%' } })
  ]));

  stage.appendChild(el('div', { class: 'quiz-hanzi', text: w.hanzi }));
  stage.appendChild(el('div', { class: 'quiz-hint', text: '병음과 뜻을 떠올려 보세요' }));

  if (!state.quizRevealed) {
    stage.appendChild(el('div', { class: 'quiz-actions' }, [
      el('button', {
        class: 'btn btn-primary',
        text: '정답 확인 ▾',
        on: { click: () => { state.quizRevealed = true; render(); }}
      })
    ]));
  } else {
    const reveal = el('div', { class: 'reveal-block' }, [
      el('div', { class: 'reveal-pinyin', text: w.pinyin }),
      el('div', { class: 'reveal-meaning', text: w.meaning })
    ]);
    stage.appendChild(reveal);
    stage.appendChild(el('div', { class: 'judge-row' }, [
      el('button', {
        class: 'judge-btn wrong',
        text: '✗ 틀렸음',
        on: { click: async () => {
          state.quizWrong.push(w);
          await recordWrong(w.id);
          state.quizIndex += 1;
          state.quizRevealed = false;
          render();
        }}
      }),
      el('button', {
        class: 'judge-btn correct',
        text: '✓ 맞췄음',
        on: { click: async () => {
          state.quizCorrect.push(w);
          // if it was previously wrong, reduce count or remove
          const key = String(w.id);
          if (wrongAnswers[key]) {
            wrongAnswers[key].count = Math.max(0, wrongAnswers[key].count - 1);
            if (wrongAnswers[key].count === 0) delete wrongAnswers[key];
            await saveWrongAnswers();
          }
          state.quizIndex += 1;
          state.quizRevealed = false;
          render();
        }}
      })
    ]));
  }

  wrap.appendChild(stage);

  // skip / quit
  wrap.appendChild(el('div', { style: { display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}, [
    el('button', {
      class: 'btn btn-sm',
      text: '건너뛰기 →',
      on: { click: () => {
        state.quizIndex += 1;
        state.quizRevealed = false;
        render();
      }}
    }),
    el('button', {
      class: 'btn btn-sm',
      text: '종료',
      on: { click: () => {
        if (confirm('퀴즈를 종료하고 결과를 보시겠습니까?')) {
          state.view = 'result';
          render();
        }
      }}
    })
  ]));

  return wrap;
}

function renderResult() {
  const total = state.quizCorrect.length + state.quizWrong.length;
  const correct = state.quizCorrect.length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  let msg;
  if (pct >= 90) msg = '훌륭합니다! 거의 다 맞히셨어요. 계속 이 흐름으로!';
  else if (pct >= 70) msg = '잘하고 있어요. 틀린 단어를 한 번 더 확인해 보세요.';
  else if (pct >= 50) msg = '절반은 넘겼습니다. 오답 복습으로 굳혀보세요.';
  else msg = '괜찮아요. 단어장을 한 번 더 훑고 다시 도전해 보세요.';

  const wrap = el('div');
  wrap.appendChild(el('h2', { class: 'section-title', text: '결과' }));

  const card = el('div', { class: 'result-card' }, [
    el('div', { class: 'result-score', html: correct + '<span class="total"> / ' + total + '</span>' }),
    el('div', { class: 'result-label', text: pct + '% 정답률' }),
    el('div', { class: 'result-msg', text: msg })
  ]);

  const actions = el('div', { class: 'result-actions' }, [
    el('button', {
      class: 'btn btn-vermilion',
      text: '다시 도전',
      on: { click: () => {
        state.quizSet = shuffle(state.quizSet);
        state.quizIndex = 0;
        state.quizCorrect = [];
        state.quizWrong = [];
        state.quizRevealed = false;
        state.view = 'quiz';
        render();
      }}
    }),
    state.quizWrong.length > 0 ? el('button', {
      class: 'btn btn-primary',
      text: '틀린 것만 복습 (' + state.quizWrong.length + ')',
      on: { click: () => {
        state.quizSet = shuffle(state.quizWrong);
        state.quizIndex = 0;
        state.quizCorrect = [];
        state.quizWrong = [];
        state.quizRevealed = false;
        state.view = 'quiz';
        render();
      }}
    }) : null,
    el('button', {
      class: 'btn',
      text: '퀴즈 메뉴',
      on: { click: () => { state.view = 'quiz-setup'; render(); }}
    })
  ]);
  card.appendChild(actions);
  wrap.appendChild(card);

  // Show wrong list
  if (state.quizWrong.length > 0) {
    wrap.appendChild(el('h3', { class: 'section-title', style: { marginTop: '32px', fontSize: '20px' }, text: '이번에 틀린 단어' }));
    const list = el('div', { class: 'wordlist' });
    state.quizWrong.forEach(w => {
      list.appendChild(el('div', { class: 'word-row' }, [
        el('div', { class: 'id', text: '#' + w.id }),
        el('div', { class: 'body' }, [
          el('div', { class: 'hanzi', text: w.hanzi }),
          el('div', { class: 'pinyin', text: w.pinyin }),
          el('div', { class: 'meaning', text: w.meaning })
        ])
      ]));
    });
    wrap.appendChild(list);
  }

  return wrap;
}

function renderWrongReview() {
  const wrap = el('div');
  wrap.appendChild(el('h2', { class: 'section-title', html: '<span class="num">III.</span> 오답노트 · Wrong Notes' }));
  wrap.appendChild(el('p', { class: 'section-desc', text: '퀴즈에서 틀린 단어를 자동으로 모아둡니다. 맞히면 자동으로 차감됩니다.' }));

  const wrongIds = Object.keys(wrongAnswers).map(Number);
  const wrongWords = WORDS.filter(w => wrongIds.includes(w.id));
  // sort by count desc
  wrongWords.sort((a, b) => (wrongAnswers[b.id]?.count || 0) - (wrongAnswers[a.id]?.count || 0));

  const totalCount = wrongWords.reduce((sum, w) => sum + (wrongAnswers[w.id]?.count || 0), 0);

  const stats = el('div', { class: 'wrong-stats' }, [
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-num', text: String(wrongWords.length) }),
      el('div', { class: 'stat-label', text: '오답 단어 수' })
    ]),
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-num', text: String(totalCount) }),
      el('div', { class: 'stat-label', text: '누적 오답 횟수' })
    ])
  ]);
  wrap.appendChild(stats);

  if (wrongWords.length === 0) {
    wrap.appendChild(el('div', { class: 'empty', text: '아직 오답이 없습니다. 퀴즈를 풀어보세요!' }));
    return wrap;
  }

  const actions = el('div', { class: 'wordlist-controls' }, [
    el('div', {}, [
      el('button', {
        class: 'btn btn-vermilion',
        text: '오답만 복습 →',
        on: { click: () => {
          state.quizSet = shuffle(wrongWords);
          state.quizIndex = 0;
          state.quizCorrect = [];
          state.quizWrong = [];
          state.quizRevealed = false;
          state.view = 'quiz';
          render();
        }}
      })
    ]),
    el('button', {
      class: 'btn btn-sm',
      text: '전체 비우기',
      on: { click: async () => {
        if (confirm('오답 ' + wrongWords.length + '개를 모두 비울까요?')) {
          await clearAllWrong();
          render();
        }
      }}
    })
  ]);
  wrap.appendChild(actions);

  const list = el('div', { class: 'wordlist' });
  wrongWords.forEach(w => {
    const cnt = wrongAnswers[w.id]?.count || 0;
    list.appendChild(el('div', { class: 'wrong-row' }, [
      el('div', { class: 'id', text: '#' + w.id }),
      el('div', { class: 'body' }, [
        el('div', { class: 'hanzi', text: w.hanzi }),
        el('div', { class: 'pinyin', text: w.pinyin }),
        el('div', { class: 'meaning', text: w.meaning })
      ]),
      el('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px', alignItems: 'flex-end' }}, [
        el('span', { class: 'count-badge', text: '×' + cnt }),
        el('button', {
          class: 'btn btn-sm',
          text: '삭제',
          attrs: { title: '이 단어를 오답노트에서 제거' },
          on: { click: async () => { await clearWrong(w.id); render(); }}
        })
      ])
    ]));
  });
  wrap.appendChild(list);

  return wrap;
}

function renderFooter() {
  return el('div', { class: 'footer-note', html: 'HSK 5級 · 1300 词 · made for daily study &nbsp;<span class="seal">五級</span>' });
}

// ============ INIT ============
(async function init() {
  await loadWrongAnswers();
  render();
})();
</script>
</body>
